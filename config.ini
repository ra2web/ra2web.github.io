[General]
discordUrl=https://discord.gg/yxkVn4wBad

# Auto-load from gameresBaseUrl (CDN load) without showing the import dialog
autoLoadGameRes=yes
gameresBaseUrl=//stdres.wangerhuoda.cn/
# Optional backup game resource CDN bases. When set, manifest.json is raced once
# and the fastest valid source is used for the rest of the load.
gameresBaseUrls=//wyhjres2.bun.sh.cn/
mapsBaseUrl=//gmap.wangerhuoda.cn/map/
# Optional backup map CDN bases. The first successful map request selects the source
# and later map downloads keep using that selected source.
# mapsBaseUrls=//gmap-backup1.wangerhuoda.cn/map/,//gmap-backup2.wangerhuoda.cn/map/
modsBaseUrl=//gmap.wangerhuoda.cn/mod/
# Optional backup mod CDN bases. The first successful mod request selects the source
# and later mod downloads keep using that selected source.
# modsBaseUrls=//gmap-backup1.wangerhuoda.cn/mod/,//gmap-backup2.wangerhuoda.cn/mod/
# Base URL for music mp3 files in CDN mode (e.g. //cdn.example.com/music/)
musicBaseUrl=//stdres.wangerhuoda.cn/music/
gameResArchiveUrl=https://download.ra2web.com/full-pack.7z

# Auto-load full pack from local server (leave empty to disable)
# This will skip the import dialog and automatically download from this URL
defaultFullyPackUrl=
patchNotesUrl=
ladderRulesUrl=//www.ra2web.com/ladder-rules.html
modSdkUrl=https://github.com/ra2web/mod-sdk
donateUrl="//ra2web.com/#donate"
victoryShopUrl=https://center.bun.sh.cn
breakingNewsUrl=/breaking-news.html
oldClientsBaseUrl=/old/
quickMatchEnabled=yes
botsEnabled=yes
debugLogging=wol
debugGameState=yes
# Chronodivide 中国大区专供
defaultLanguage=zh-CN
# Force load specific MOD on startup (leave empty to disable)
forcedModId=gonghui
viewport.width=1024
viewport.height=768

p2pCdnEnabled=yes
p2pCdnTrackerUrl=wss://gserv.gz.wangerhuoda.cn:38443/p2p-cdn
p2pCdnIceServers=stun:gserv.gz.wangerhuoda.cn:3478

[Sentry]
dsn=https://268e10e6b2c60224fa86d0910a033a6f@sentry.wangerhuoda.cn/1
env=production
defaultIntegrations=yes
autoSessionTracking=no

[CorsProxy]
# <originDomain>=<corsUrl>
# * will match any origin
# .<originDomain> will also match subdomains
archive.org="https://game.chronodivide.com/cors-proxy/?url="
